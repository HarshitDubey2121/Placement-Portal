<!DOCTYPE html>
<html>
<head>
<title>Company Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
<div class="row justify-content-center">

<div class="col-md-6">

<div class="card p-4 shadow">

<h3 class="text-center">Company Registration</h3>

<form method="POST" action="/company_register">

<input name="company_name" class="form-control mb-2" placeholder="Company Name" required>
<input name="email" class="form-control mb-2" placeholder="Email" required>
<input type="password" name="password" class="form-control mb-2" placeholder="Password" required>
<input name="website" class="form-control mb-2" placeholder="Website">
<input name="location" class="form-control mb-2" placeholder="Location">

<button class="btn btn-success w-100">Register</button>

</form>

</div>
</div>
</div>
</div>

</body>
</html>

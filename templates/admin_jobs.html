<!DOCTYPE html>
<html>
<head>
<title>Admin - Jobs</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

<h2 class="mb-4">All Jobs</h2>

<div class="table-responsive">
<table class="table table-bordered table-hover shadow">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Job Title</th>
<th>Company</th>
<th>Location</th>
<th>Salary</th>
<th>Deadline</th>
<th>Posted On</th>
</tr>
</thead>

<tbody>

{% for j in data %}
<tr>
<td>{{ j.id }}</td>
<td>{{ j.title }}</td>
<td>{{ j.company_name }}</td>
<td>{{ j.location }}</td>
<td>{{ j.salary }}</td>
<td>{{ j.deadline }}</td>
<td>{{ j.created_at }}</td>
</tr>
{% endfor %}

</tbody>

</table>
</div>

</div>

</body>
</html>

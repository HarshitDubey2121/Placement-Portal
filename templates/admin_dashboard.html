<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

<h2 class="mb-4">Admin Dashboard</h2>

<div class="row">

<div class="col-md-3">
<div class="card p-3 text-center shadow">
<h4>{{ students }}</h4>
<p>Students</p>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center shadow">
<h4>{{ companies }}</h4>
<p>Companies</p>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center shadow">
<h4>{{ jobs }}</h4>
<p>Jobs</p>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center shadow">
<h4>{{ applications }}</h4>
<p>Applications</p>
</div>
</div>

</div>

<hr>

<a href="/admin_students" class="btn btn-primary">View Students</a>
<a href="/admin_companies" class="btn btn-warning">View Companies</a>
<a href="/admin_jobs" class="btn btn-info">View Jobs</a>
<a href="/admin_applications" class="btn btn-dark">View Applications</a>

</div>

</body>
</html>

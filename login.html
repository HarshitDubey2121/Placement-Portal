<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container">
<div class="row justify-content-center align-items-center min-vh-100">

<div class="col-md-5">

<div class="card p-4 shadow">

<h3 class="text-center mb-3">Login Panel</h3>

<ul class="nav nav-tabs" id="myTab">
<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#student">Student</button>
</li>
<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#company">Company</button>
</li>
<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#admin">Admin</button>
</li>
</ul>

<div class="tab-content mt-3">

<!-- STUDENT LOGIN -->
<div class="tab-pane fade show active" id="student">
<form method="POST" action="/login">
<input name="email" class="form-control mb-2" placeholder="Email" required>
<input type="password" name="password" class="form-control mb-2" placeholder="Password" required>
<button class="btn btn-primary w-100">Login</button>
</form>
</div>

<!-- COMPANY LOGIN -->
<div class="tab-pane fade" id="company">
<form method="POST" action="/company_login">
<input name="email" class="form-control mb-2" placeholder="Company Email" required>
<input type="password" name="password" class="form-control mb-2" placeholder="Password" required>
<button class="btn btn-warning w-100">Login</button>
</form>
</div>

<!-- ADMIN LOGIN -->
<div class="tab-pane fade" id="admin">
<form method="POST" action="/admin_login">
<input name="username" class="form-control mb-2" placeholder="Username" required>
<input type="password" name="password" class="form-control mb-2" placeholder="Password" required>
<button class="btn btn-dark w-100">Login</button>
</form>
</div>

</div>

</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

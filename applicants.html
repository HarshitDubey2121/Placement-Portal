<!DOCTYPE html>
<html>
<head>
<title>Applicants</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

<h2>Applicants</h2>

{% for a in applicants %}
<div class="card p-3 mb-3">

<h5>{{ a.name }}</h5>
<p>{{ a.email }}</p>

<form method="POST" action="/schedule/{{ a.id }}">
<input type="datetime-local" name="date" required>
<input name="mode" placeholder="Online/Offline">
<input name="link" placeholder="Meeting Link">
<button class="btn btn-warning">Schedule</button>
</form>

<a href="/result/{{ a.id }}/Selected" class="btn btn-success mt-2">Select</a>
<a href="/result/{{ a.id }}/Rejected" class="btn btn-danger mt-2">Reject</a>
<a href="/mark_absent/{{ a.id }}" class="btn btn-dark mt-2">Absent</a>

</div>
{% endfor %}

</div>

</body>
</html>

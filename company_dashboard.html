<!DOCTYPE html>
<html>
<head>
<title>Company Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

<h2>Welcome {{ session.company_name }}</h2>

<h4 class="mt-4">Post Job</h4>

<form method="POST" action="/post_job">
<input name="title" placeholder="Job Title" class="form-control mb-2" required>
<textarea name="description" class="form-control mb-2" placeholder="Description"></textarea>
<input name="salary" class="form-control mb-2" placeholder="Salary">
<input name="location" class="form-control mb-2" placeholder="Location">
<input type="date" name="deadline" class="form-control mb-2">
<button class="btn btn-success">Post Job</button>
</form>

<hr>

<h4>Your Jobs</h4>

{% for job in jobs %}
<div class="card p-3 mb-3">
<h5>{{ job.title }}</h5>
<a href="/view_applicants/{{ job.id }}" class="btn btn-primary">View Applicants</a>
</div>
{% endfor %}

</div>

</body>
</html>

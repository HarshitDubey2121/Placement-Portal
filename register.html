<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

<div class="container">
<div class="row justify-content-center align-items-center min-vh-100">

<div class="col-md-6">

<div class="card shadow-lg border-0 p-4 premium-card">

<h2 class="text-center fw-bold mb-4">Student Registration</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="alert alert-warning">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form action="/register" method="POST">

<div class="mb-3">
<label>Full Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<div class="mb-3">
<label>Course</label>
<input type="text" name="course" class="form-control" placeholder="BCA / MCA / B.Tech" required>
</div>

<div class="mb-3">
<label>Mobile</label>
<input type="text" name="mobile" class="form-control" required>
</div>

<button class="btn btn-success w-100">Register Now</button>

</form>

<div class="text-center mt-3">
<a href="/login_page">Already Registered? Login</a>
</div>

<div class="text-center mt-2">
<a href="/">← Back Home</a>
</div>

</div>
</div>
</div>
</div>

</body>
</html>

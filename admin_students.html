<!DOCTYPE html>
<html>
<head>
<title>Students</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container py-5">

<h2>Students</h2>

<table class="table table-bordered">
<tr>
<th>Name</th>
<th>Email</th>
<th>Penalty</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for s in data %}
<tr>
<td>{{ s.name }}</td>
<td>{{ s.email }}</td>
<td>{{ s.penalty_points }}</td>
<td>{{ 'Blocked' if s.is_blocked else 'Active' }}</td>
<td>
<a href="/toggle_block/{{ s.id }}" class="btn btn-danger btn-sm">Toggle</a>
</td>
</tr>
{% endfor %}

</table>

</div>
</body>
</html>
